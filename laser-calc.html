<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Лазерная резка — Калькулятор</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Unbounded:wght@400;700;900&display=swap');

  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --border: #222;
    --accent: #ff4d00;
    --accent2: #ffb800;
    --text: #f0f0f0;
    --muted: #555;
    --green: #00ff88;
    --card: #161616;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    border-bottom: 1px solid var(--border);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--surface);
  }

  header h1 {
    font-family: 'Unbounded', sans-serif;
    font-size: 14px;
    font-weight: 900;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
  }

  header span {
    font-size: 11px;
    color: var(--muted);
    margin-left: auto;
  }

  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    max-width: 800px;
    width: 100%;
    margin: 0 auto;
  }

  .msg {
    display: flex;
    flex-direction: column;
    gap: 4px;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.user { align-items: flex-end; }
  .msg.bot { align-items: flex-start; }

  .msg-label {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 0 4px;
  }

  .msg-bubble {
    max-width: 90%;
    padding: 12px 16px;
    border-radius: 2px;
    font-size: 13px;
    line-height: 1.6;
    white-space: pre-wrap;
  }

  .msg.user .msg-bubble {
    background: var(--accent);
    color: #fff;
    border-radius: 2px 2px 0 2px;
  }

  .msg.bot .msg-bubble {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 2px 2px 2px 0;
  }

  .result-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    padding: 16px;
    font-size: 12px;
    line-height: 1.8;
    max-width: 90%;
  }

  .result-card .section-title {
    font-family: 'Unbounded', sans-serif;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 8px;
    margin-top: 12px;
  }

  .result-card .section-title:first-child { margin-top: 0; }

  .result-row {
    display: flex;
    justify-content: space-between;
    gap: 16px;
    padding: 2px 0;
    border-bottom: 1px solid #1a1a1a;
  }

  .result-row .label { color: var(--muted); }
  .result-row .value { color: var(--text); font-weight: 700; }

  .price-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-top: 8px;
  }

  .price-box {
    background: #0d0d0d;
    border: 1px solid var(--border);
    padding: 10px;
    text-align: center;
  }

  .price-box .ptype {
    font-size: 9px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }

  .price-box .pval {
    font-family: 'Unbounded', sans-serif;
    font-size: 15px;
    font-weight: 700;
  }

  .price-box.cash .pval { color: var(--green); }
  .price-box.nonvat .pval { color: var(--accent2); }
  .price-box.vat .pval { color: var(--accent); }

  .file-preview {
    background: #0d0d0d;
    border: 1px solid var(--border);
    padding: 8px 12px;
    font-size: 11px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .file-preview .fname { color: var(--text); }

  .thinking {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--muted);
    font-size: 12px;
    padding: 8px 0;
  }

  .dots span {
    display: inline-block;
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
    margin: 0 2px;
  }
  .dots span:nth-child(2) { animation-delay: 0.2s; }
  .dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
    40% { transform: scale(1); opacity: 1; }
  }

  .input-area {
    border-top: 1px solid var(--border);
    background: var(--surface);
    padding: 12px 20px;
  }

  .input-inner {
    max-width: 800px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .file-zone {
    border: 1px dashed var(--border);
    padding: 10px 14px;
    font-size: 11px;
    color: var(--muted);
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .file-zone:hover, .file-zone.drag { border-color: var(--accent); color: var(--text); }
  .file-zone input { display: none; }

  .attached-files {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .attached-tag {
    background: #1a1a1a;
    border: 1px solid var(--border);
    padding: 4px 8px;
    font-size: 11px;
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--accent2);
  }

  .attached-tag button {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 13px;
    line-height: 1;
    padding: 0;
  }

  .row {
    display: flex;
    gap: 8px;
  }

  textarea {
    flex: 1;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    padding: 10px 14px;
    resize: none;
    outline: none;
    min-height: 44px;
    max-height: 120px;
    transition: border-color 0.2s;
  }

  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--muted); }

  button.send {
    background: var(--accent);
    border: none;
    color: #fff;
    font-family: 'Unbounded', sans-serif;
    font-size: 11px;
    font-weight: 700;
    padding: 0 20px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: background 0.2s;
  }

  button.send:hover { background: #ff6a00; }
  button.send:disabled { background: var(--muted); cursor: not-allowed; }

  .api-bar {
    background: #0d0d0d;
    border-bottom: 1px solid var(--border);
    padding: 8px 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 11px;
  }

  .api-bar label { color: var(--muted); white-space: nowrap; }

  .api-bar input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 6px 10px;
    outline: none;
    max-width: 340px;
  }

  .api-bar input:focus { border-color: var(--accent); }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
  }
  .status-dot.ok { background: var(--green); }

  .hint {
    font-size: 10px;
    color: var(--muted);
    text-align: center;
    padding: 4px 0;
  }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); }
</style>
</head>
<body>

<header>
  <div style="width:8px;height:8px;background:var(--accent);border-radius:50%"></div>
  <h1>⚡ Laser Calc</h1>
  <span>Bodor A3 · 3000W</span>
</header>

<div class="api-bar">
  <label>API KEY:</label>
  <input type="password" id="apiKey" placeholder="sk-ant-api03-..." oninput="checkKey()">
  <div class="status-dot" id="statusDot"></div>
  <span id="statusText" style="color:var(--muted)">не задан</span>
</div>

<div class="chat-area" id="chatArea">
  <div class="msg bot">
    <div class="msg-label">Калькулятор</div>
    <div class="msg-bubble">Привет! Отправь DXF, фото чертежа или просто напиши размеры детали.

Укажи материал и толщину — и я посчитаю всё за секунду.

Например: <span style="color:var(--accent2)">«сталь 6мм, длина реза 2.5м, 8 пробитий»</span></div>
  </div>
</div>

<div class="input-area">
  <div class="input-inner">
    <div class="attached-files" id="attachedFiles"></div>
    <label class="file-zone" id="fileZone">
      <input type="file" id="fileInput" multiple accept=".dxf,.dwg,.pdf,.png,.jpg,.jpeg,.svg" onchange="handleFiles(this.files)">
      <span>📎</span>
      <span>Прикрепить файл (DXF, PDF, фото)</span>
    </label>
    <div class="row">
      <textarea id="msgInput" placeholder="Сталь 6мм... или просто задай вопрос" rows="1"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"
        oninput="autoResize(this)"></textarea>
      <button class="send" id="sendBtn" onclick="send()">СЧИТАТЬ</button>
    </div>
    <div class="hint">Enter — отправить · Shift+Enter — новая строка</div>
  </div>
</div>

<script>
const SYSTEM_PROMPT = `Ты — калькулятор лазерной резки для производственного цеха. Работаешь со станком Bodor A3-00-GB (3000W).

ТАРИФЫ:
- Резка: 45 руб/м
- Проколы: 3 руб/шт
- Машинное время: 14000 руб/ч
- Металл: 70 руб/кг

СКОРОСТИ И ВРЕМЯ ПРОКОЛА (Ст3 / чёрная сталь):
3мм → 9.0 м/мин, прокол 0.35 сек
4мм → 3.4 м/мин, прокол 0.44 сек
5мм → 3.1 м/мин, прокол 0.70 сек
6мм → 2.2 м/мин, прокол 0.80 сек
8мм → 1.8 м/мин, прокол 0.90 сек
10мм → 1.35 м/мин, прокол 0.95 сек
12мм → 1.0 м/мин, прокол 0.90 сек

ПРАЙС МЕТАЛЛА (руб/м²):
2мм→1100 | 3мм→1600 | 4мм→2100 | 5мм→2600 | 6мм→3100
8мм→4100 | 10мм→5100 | 12мм→6100 | 16мм→8100 | 20мм→10100

СТАНДАРТНЫЕ ЛИСТЫ:
2мм → 1250×2500 мм (площадь 3.125 м²)
3-12мм → 1500×3000 мм (площадь 4.5 м²)

ПРАВИЛА РАСЧЁТА МЕТАЛЛА:
- Если площадь деталей < 0.5 листа → цена за фактическую площадь
- Если площадь деталей ≥ 0.5 листа → цена за целый лист

ФОРМУЛА ВРЕМЕНИ РЕЗКИ:
время_ч = ((длина_реза_м / скорость_м_мин) + (кол_проколов × время_прокола_сек / 60)) / 60
Затем умножить на коэффициент 2.7 (полный цикл станка с перемещениями)

ФОРМУЛА СТОИМОСТИ РАБОТЫ:
работа = (метраж × 45) + (проколы × 3) + (время_ч × 14000)

ИТОГО = металл + работа

ТРИ ВАРИАНТА ДЛЯ КЛИЕНТА:
- Наличные: × 1.0
- Без НДС: × 1.1111
- С НДС: × 1.4333

ФОРМАТ ОТВЕТА — СТРОГО ТАК (используй эти метки):

[ДЛЯ МЕНЯ]
Металл: X руб (X м², X листов/часть листа)
Время резки (чистое): X мин
Время с коэф. 2.7: X мин (X ч)
Проколов: X шт
Метраж реза: X м
Стоимость метража: X руб
Стоимость машвремени: X руб
Работа итого: X руб
ИТОГО (себестоимость): X руб

[ДЛЯ КЛИЕНТА]
Наличные: X руб
Без НДС: X руб
С НДС: X руб

Если пользователь прислал фото или PDF чертежа — проанализируй геометрию, оцени длину реза и количество пробитий максимально точно.
Если данных недостаточно — уточни только самое необходимое (материал, толщину).
Отвечай кратко и по делу. Лишних слов не добавляй.`;

let attachedFiles = [];
let history = [];
let isLoading = false;

function checkKey() {
  const key = document.getElementById('apiKey').value.trim();
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusText');
  if (key.startsWith('sk-ant-')) {
    dot.className = 'status-dot ok';
    txt.textContent = 'ключ задан';
    txt.style.color = 'var(--green)';
  } else {
    dot.className = 'status-dot';
    txt.textContent = key ? 'неверный формат' : 'не задан';
    txt.style.color = 'var(--muted)';
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

async function handleFiles(files) {
  for (const file of files) {
    if (file.name.toLowerCase().endsWith('.dxf')) {
      const text = await file.text();
      attachedFiles.push({ name: file.name, type: 'dxf', content: text });
    } else {
      const b64 = await toBase64(file);
      const mt = file.type || 'image/jpeg';
      attachedFiles.push({ name: file.name, type: 'image', mediaType: mt, data: b64 });
    }
  }
  renderAttached();
  document.getElementById('fileInput').value = '';
}

function toBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(',')[1]);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

function renderAttached() {
  const c = document.getElementById('attachedFiles');
  c.innerHTML = '';
  attachedFiles.forEach((f, i) => {
    const tag = document.createElement('div');
    tag.className = 'attached-tag';
    tag.innerHTML = `<span>${f.type === 'dxf' ? '📐' : '🖼'} ${f.name}</span><button onclick="removeFile(${i})">×</button>`;
    c.appendChild(tag);
  });
}

function removeFile(i) {
  attachedFiles.splice(i, 1);
  renderAttached();
}

function parseDXF(content) {
  let totalLength = 0;
  let piercings = 0;

  const lines = content.split('\n').map(l => l.trim());

  for (let i = 0; i < lines.length; i++) {
    const code = lines[i];
    const val = lines[i + 1];

    if (code === '0' && val) {
      const entity = val.trim();

      if (entity === 'LINE') {
        const props = {};
        for (let j = i + 2; j < Math.min(i + 30, lines.length); j += 2) {
          props[lines[j]] = parseFloat(lines[j + 1]);
          if (lines[j] === '0') break;
        }
        const dx = (props['12'] || 0) - (props['10'] || 0);
        const dy = (props['22'] || 0) - (props['20'] || 0);
        totalLength += Math.sqrt(dx * dx + dy * dy);
        piercings++;
      }

      if (entity === 'ARC') {
        const props = {};
        for (let j = i + 2; j < Math.min(i + 30, lines.length); j += 2) {
          props[lines[j]] = parseFloat(lines[j + 1]);
          if (lines[j] === '0') break;
        }
        const r = props['40'] || 0;
        let start = (props['50'] || 0) * Math.PI / 180;
        let end = (props['51'] || 0) * Math.PI / 180;
        if (end < start) end += 2 * Math.PI;
        totalLength += r * (end - start);
      }

      if (entity === 'CIRCLE') {
        const props = {};
        for (let j = i + 2; j < Math.min(i + 20, lines.length); j += 2) {
          props[lines[j]] = parseFloat(lines[j + 1]);
          if (lines[j] === '0') break;
        }
        const r = props['40'] || 0;
        totalLength += 2 * Math.PI * r;
        piercings++;
      }

      if (entity === 'LWPOLYLINE' || entity === 'POLYLINE') {
        piercings++;
      }
    }
  }

  return {
    lengthMm: totalLength,
    lengthM: totalLength / 1000,
    piercings: Math.max(piercings, 1)
  };
}

function buildMessages(userText, files) {
  const content = [];

  for (const f of files) {
    if (f.type === 'dxf') {
      const parsed = parseDXF(f.content);
      content.push({
        type: 'text',
        text: `[DXF файл: ${f.name}]\nПарсинг геометрии:\n- Длина реза: ${parsed.lengthM.toFixed(3)} м\n- Пробитий (оценка): ${parsed.piercings} шт\n\nИспользуй эти данные для расчёта. Уточни у пользователя материал и толщину если не указаны.`
      });
    } else if (f.type === 'image') {
      content.push({
        type: 'image',
        source: { type: 'base64', media_type: f.mediaType, data: f.data }
      });
    }
  }

  if (userText) content.push({ type: 'text', text: userText });

  return content;
}

function parseResult(text) {
  const hasMy = text.includes('[ДЛЯ МЕНЯ]');
  const hasClient = text.includes('[ДЛЯ КЛИЕНТА]');

  if (!hasMy && !hasClient) return null;

  return { raw: text };
}

function renderResultCard(text) {
  const card = document.createElement('div');
  card.className = 'result-card';

  const sections = text.split(/\[([^\]]+)\]/g).filter(s => s.trim());
  let i = 0;
  while (i < sections.length) {
    const maybeTitle = sections[i].trim();
    const maybeContent = sections[i + 1];

    if (maybeContent && (maybeTitle === 'ДЛЯ МЕНЯ' || maybeTitle === 'ДЛЯ КЛИЕНТА')) {
      const title = document.createElement('div');
      title.className = 'section-title';
      title.textContent = maybeTitle;
      card.appendChild(title);

      const lines = maybeContent.trim().split('\n').filter(l => l.trim());

      if (maybeTitle === 'ДЛЯ КЛИЕНТА') {
        const grid = document.createElement('div');
        grid.className = 'price-grid';

        lines.forEach(line => {
          const [lbl, val] = line.split(':').map(s => s.trim());
          const box = document.createElement('div');
          let cls = 'price-box';
          if (lbl?.includes('Налич')) cls += ' cash';
          else if (lbl?.includes('НДС') && !lbl.includes('Без')) cls += ' vat';
          else cls += ' nonvat';
          box.className = cls;
          box.innerHTML = `<div class="ptype">${lbl || ''}</div><div class="pval">${val || ''}</div>`;
          grid.appendChild(box);
        });
        card.appendChild(grid);
      } else {
        lines.forEach(line => {
          const colonIdx = line.indexOf(':');
          if (colonIdx > -1) {
            const row = document.createElement('div');
            row.className = 'result-row';
            row.innerHTML = `<span class="label">${line.slice(0, colonIdx)}</span><span class="value">${line.slice(colonIdx + 1).trim()}</span>`;
            card.appendChild(row);
          }
        });
      }
      i += 2;
    } else {
      i++;
    }
  }

  return card;
}

function addMsg(role, content, isResult = false) {
  const area = document.getElementById('chatArea');
  const wrap = document.createElement('div');
  wrap.className = `msg ${role === 'user' ? 'user' : 'bot'}`;

  const label = document.createElement('div');
  label.className = 'msg-label';
  label.textContent = role === 'user' ? 'Вы' : 'Калькулятор';
  wrap.appendChild(label);

  if (isResult && role === 'assistant') {
    const card = renderResultCard(content);
    wrap.appendChild(card);
  } else {
    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.textContent = content;
    wrap.appendChild(bubble);
  }

  area.appendChild(wrap);
  area.scrollTop = area.scrollHeight;
  return wrap;
}

function addThinking() {
  const area = document.getElementById('chatArea');
  const wrap = document.createElement('div');
  wrap.className = 'msg bot';
  wrap.id = 'thinkingMsg';
  wrap.innerHTML = `<div class="msg-label">Калькулятор</div>
    <div class="thinking"><div class="dots"><span></span><span></span><span></span></div> считаю...</div>`;
  area.appendChild(wrap);
  area.scrollTop = area.scrollHeight;
}

async function send() {
  if (isLoading) return;
  const apiKey = document.getElementById('apiKey').value.trim();
  if (!apiKey) { alert('Введи API ключ!'); return; }

  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  const files = [...attachedFiles];

  if (!text && files.length === 0) return;

  // Display user msg
  let displayText = text;
  if (files.length) displayText = (text ? text + '\n' : '') + files.map(f => `📎 ${f.name}`).join('\n');
  addMsg('user', displayText);

  // Build API content
  const msgContent = buildMessages(text, files);
  history.push({ role: 'user', content: msgContent });

  // Clear input
  input.value = '';
  input.style.height = 'auto';
  attachedFiles = [];
  renderAttached();

  isLoading = true;
  document.getElementById('sendBtn').disabled = true;
  addThinking();

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1500,
        system: SYSTEM_PROMPT,
        messages: history
      })
    });

    const data = await resp.json();

    document.getElementById('thinkingMsg')?.remove();

    if (data.error) {
      addMsg('assistant', '❌ Ошибка API: ' + data.error.message);
    } else {
      const reply = data.content?.[0]?.text || '';
      history.push({ role: 'assistant', content: reply });

      const isResult = reply.includes('[ДЛЯ МЕНЯ]') || reply.includes('[ДЛЯ КЛИЕНТА]');
      addMsg('assistant', reply, isResult);
    }
  } catch (e) {
    document.getElementById('thinkingMsg')?.remove();
    addMsg('assistant', '❌ Ошибка соединения: ' + e.message);
  }

  isLoading = false;
  document.getElementById('sendBtn').disabled = false;
}

// Drag & drop
const zone = document.getElementById('fileZone');
zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag'); });
zone.addEventListener('dragleave', () => zone.classList.remove('drag'));
zone.addEventListener('drop', e => {
  e.preventDefault();
  zone.classList.remove('drag');
  handleFiles(e.dataTransfer.files);
});
</script>
</body>
